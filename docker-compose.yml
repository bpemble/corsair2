name: corsair

services:
  # ── IB Gateway (Paper) ──────────────────────────────────────────────
  # IBC auto-starts IB Gateway and handles the mandatory daily restart.
  # Host networking because IB Gateway binds API socket to IPv6 only.
  ib-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    network_mode: host
    env_file: .env
    command: ["/bin/bash", "/mnt/scripts/gateway_run.sh"]
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      TWS_PORT: "${TWS_PORT:-4002}"
    volumes:
      - ib-gateway-data:/opt/ibgateway
      - ./scripts/gateway_run.sh:/mnt/scripts/gateway_run.sh:ro
      - ./scripts/totp_helper.sh:/mnt/scripts/totp_helper.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/${TWS_PORT:-4002}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  # ── Corsair v2 Market Maker (LEGACY — Python broker) ────────────────
  # Retired 2026-05-02 by Phase 6.7 cutover. The Rust broker
  # (`corsair-broker-rs`) is now the live runtime. This service is
  # preserved as `--profile legacy-python-broker` for emergency
  # rollback ONLY: `docker compose --profile legacy-python-broker up
  # -d corsair`. Brings up ib_insync on clientId=0 — make sure to stop
  # `corsair-broker-rs` first to avoid clientId conflict.
  corsair:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["legacy-python-broker"]
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
    network_mode: host
    env_file: .env
    cap_add:
      - SYS_PTRACE
    environment:
      CORSAIR_GATEWAY_HOST: "127.0.0.1"
      CORSAIR_GATEWAY_PORT: "${TWS_PORT:-4002}"
      CORSAIR_ACCOUNT_ID: "${IBKR_ACCOUNT}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      # v1.4 Stage 1 paper config. Flip to corsair_v2_config.yaml to
      # roll back to the v1.3 config (asymmetric scope, $200K cap).
      CORSAIR_CONFIG: "${CORSAIR_CONFIG:-config/hg_v1_4_paper.yaml}"
      # Loop-block detector knobs (src/loop_block_detector.py). Override
      # from the host shell to tune without a rebuild — e.g. set
      # CORSAIR_LOOP_BLOCK_THRESHOLD_MS=20 for finer-grained capture, or
      # CORSAIR_LOOP_BLOCK_DISABLED=1 to silence during a deep py-spy run.
      CORSAIR_LOOP_BLOCK_THRESHOLD_MS: "${CORSAIR_LOOP_BLOCK_THRESHOLD_MS:-50}"
      CORSAIR_LOOP_BLOCK_PING_MS: "${CORSAIR_LOOP_BLOCK_PING_MS:-10}"
      CORSAIR_LOOP_BLOCK_DISABLED: "${CORSAIR_LOOP_BLOCK_DISABLED:-}"
      # Broker IPC mode (mm_service_split.md). When "1", corsair runs as
      # the broker: starts the IPC server, forwards gateway events to
      # the trader process. Default empty → no IPC server, no trader
      # interaction, identical to pre-split behavior.
      CORSAIR_BROKER_MODE: "${CORSAIR_BROKER_MODE:-}"
      # Phase 5+: IPC transport choice. "socket" (default) uses an
      # asyncio Unix domain socket (~330μs p50); "shm" uses
      # memory-mapped ring buffers with polling (~50-100μs p50).
      # Both broker and trader must agree.
      CORSAIR_IPC_TRANSPORT: "${CORSAIR_IPC_TRANSPORT:-socket}"
      # Phase 3 cut-over: when "1", broker's quote engine stops
      # placing orders; trader's place_order/cancel_order commands
      # over IPC drive all option order flow. Default unset →
      # broker quotes as today, trader logs only.
      CORSAIR_TRADER_PLACES_ORDERS: "${CORSAIR_TRADER_PLACES_ORDERS:-}"
    volumes:
      - ./logs:/app/logs
      - ./logs-paper:/app/logs-paper      # v1.4 §9.5 paper JSONL streams
      - ./data:/app/data
      - ./span_data:/app/span_data
      - ./config:/app/config:ro
      # Docker socket — lets the watchdog escalate to a gateway container
      # restart when the in-engine recovery loop can't fix a JVM-level
      # hang inside ib-gateway. See watchdog.escalate_gateway_restart().
      - /var/run/docker.sock:/var/run/docker.sock:rw
    healthcheck:
      # Snapshot file is written by the main loop every ~1s in steady state.
      # If it's >60s old the loop is hung even if the process is still alive
      # — that's the failure mode log-mtime healthchecks miss because the
      # ib_insync stderr keeps the log file fresh during silent hangs.
      # Triggers `restart: unless-stopped` after 3 consecutive failures.
      #
      # Threshold is 60s (not 30s) to decouple it from the 30s discovery
      # timeout in src/watchdog.py — at 30s a discovery that legitimately
      # takes 31s would get the container nuked mid-recovery, even though
      # the watchdog would have succeeded a second later.
      test: ["CMD-SHELL", "test -f /app/data/hg_chain_snapshot.json && test $$(( $$(date +%s) - $$(stat -c %Y /app/data/hg_chain_snapshot.json) )) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

  # ── Dashboard ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./logs:/app/logs:ro
      - ./logs-paper:/app/logs-paper:ro  # v1.4 §9.5 paper JSONL streams
      - ./data:/app/data:ro
      - ./config:/app/config:ro

  # ── Trader (mm_service_split Phase 1+2) ─────────────────────────────
  # Connects to the broker (corsair) over a Unix socket in the shared
  # data volume. Phase 2 reads forwarded events (ticks, fills, order
  # acks) and writes to logs-paper/trader_events-YYYY-MM-DD.jsonl;
  # phase 3 will own order placement.
  #
  # Reuses the corsair image — same Python env (pricing.py, sabr.py,
  # corsair_pricing Rust extension all available). Different command.
  #
  # Started ALONGSIDE corsair when CORSAIR_BROKER_MODE=1; otherwise
  # this service starts but its IPCClient retries connect-loop
  # forever (harmless). To disable entirely, run
  # `docker compose up -d corsair dashboard ib-gateway` and skip trader.
  # ── Trader (Rust binary) ────────────────────────────────────────────
  # Reads from the Rust broker's IPC and places orders against IBKR via
  # the broker. Default-on since Phase 6.7 cutover.
  trader:
    image: corsair-corsair
    depends_on:
      # Post-cutover (Phase 6.7): trader depends on the Rust broker, not
      # the retired Python broker. Old behavior preserved by setting
      # TRADER_BROKER_DEP=corsair via env if rollback is needed.
      corsair-broker-rs:
        condition: service_started
    network_mode: host
    env_file: .env
    environment:
      LOG_LEVEL: "${TRADER_LOG_LEVEL:-INFO}"
      CORSAIR_IPC_SOCKET: "${CORSAIR_IPC_SOCKET:-/app/data/corsair_ipc.sock}"
      # Post-cutover default: SHM transport (Rust broker uses SHM rings).
      CORSAIR_IPC_TRANSPORT: "${CORSAIR_IPC_TRANSPORT:-shm}"
      CORSAIR_CONFIG: "${CORSAIR_CONFIG:-config/hg_v1_4_paper.yaml}"
      # Live placement now default-on after Phase 6.7 cutover. Set to
      # empty string to disable (trader logs decisions only).
      CORSAIR_TRADER_PLACES_ORDERS: "${CORSAIR_TRADER_PLACES_ORDERS:-1}"
      CORSAIR_TRADER_BACKEND: "${CORSAIR_TRADER_BACKEND:-}"
      # Post-cutover default: Rust trader binary (10x lower TTT than
      # Python trader). Requires CORSAIR_IPC_TRANSPORT=shm.
      CORSAIR_TRADER_LANG: "${CORSAIR_TRADER_LANG:-rust}"
    volumes:
      - ./logs-paper:/app/logs-paper      # event JSONL output
      - ./data:/app/data                  # IPC socket lives here
    command: ["sh", "-c",
              "if [ \"$$CORSAIR_TRADER_LANG\" = rust ]; then \
                  exec /usr/local/bin/corsair_trader_rust; \
               else \
                  exec python3 -m src.trader.main; \
               fi"]
    restart: unless-stopped

  # ── corsair_broker shadow (v3 Phase 5A) ─────────────────────────────
  # Rust broker daemon running ALONGSIDE the live Python broker for
  # validation + latency measurement. Profile-gated so it only starts
  # when explicitly requested:
  #   docker compose --profile rust-broker up -d corsair-broker-rs
  #
  # Connects to IBKR with clientId=10 (Python broker uses 0). Reads
  # config/runtime_v3.yaml. Publishes its snapshot to
  # data/snapshot_rust.json (separate from Python's hg_chain_snapshot).
  #
  # SHADOW mode (default): no orders placed. Set
  # CORSAIR_BROKER_SHADOW=0 to flip to live (only after Phase 5B IPC
  # work lands; otherwise the trader can't talk to it).
  corsair-broker-rs:
    image: corsair-corsair
    depends_on:
      ib-gateway:
        condition: service_healthy
    # Host networking — same as corsair + trader. ib-gateway binds the
    # API socket to localhost only, so bridged containers can't reach it.
    network_mode: host
    env_file: .env
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
      CORSAIR_BROKER_CONFIG: "/app/config/runtime_v3.yaml"
      CORSAIR_BROKER_SHADOW: "${CORSAIR_BROKER_SHADOW:-0}"
      CORSAIR_BROKER_IPC_ENABLED: "${CORSAIR_BROKER_IPC_ENABLED:-1}"
    volumes:
      - ./logs:/app/logs
      - ./logs-paper:/app/logs-paper
      - ./data:/app/data
      - ./config:/app/config:ro
    command: ["/usr/local/bin/corsair_broker_rust"]
    restart: unless-stopped

volumes:
  ib-gateway-data:
