account:
  gateway_host: "127.0.0.1"
  gateway_port: 4002
  client_id: 0  # MUST be 0 on FA accounts — see connection.py
  account_id: "UXXXXXXX"

# ── Portfolio-wide (shared across all products) ────────────────────────
constraints:
  # Stage 1 smoke test (HG-only; ETH wound down 2026-04-18; crowsnest
  # handoff spec docs/hg_spec_v1.3.md). $200K capital, 50% → $100K Tier-2
  # synthetic ceiling, 70% → $140K Tier-1 kill (see kill_switch below).
  # Synthetic SPAN runs ~+25-30% over IBKR's reported MaintMarginReq
  # (synthetic_span.py), so real-IBKR ceiling is closer to $77K at Stage 1.
  capital: 200000
  margin_ceiling_pct: 0.50     # 50% of $200K = $100K synthetic (Tier-2)
  delta_ceiling: 3.0           # |portfolio net_delta| must be <= this
  theta_floor: -200            # portfolio net_theta $/day, must be >= this
  # Margin-priority escape: when margin is currently breached, allow
  # fills that strictly reduce post-fill margin even if they degrade
  # tier-2 constraints (delta, theta) into soft-breach territory — as
  # long as no hard kill (delta_kill / theta_kill / margin_kill_pct)
  # is crossed. Tier-1 (margin = solvency) takes priority over tier-2
  # (P&L drag / directional exposure) because without margin relief
  # the system can wedge with no permitted unwind path (observed
  # 2026-04-09 after an adverse-fill burst). Set false to disable
  # and revert to strict per-constraint independence.
  margin_escape_enabled: true

# Inventory balance monitor (hg_spec_v1.3 §6c). Stage 1 MVP wires only
# the halt threshold; widen/tighten quote adjustments at lower thresholds
# are tracked but not yet applied — see Phase 5 note in handoff plan.
inventory_balance:
  halt_pct: 0.50              # Halt new SELL opens on overweight right above this
  widen_pct: 0.30             # NOT YET WIRED — widen overweight by 1 tick
  tighten_pct: 0.15           # NOT YET WIRED — tighten underweight by 1 tick

kill_switch:
  margin_kill_pct: 0.70        # 70% of $200K = $140K (Stage 1 Tier-1 kill)
  max_daily_loss: -2500        # Stage 1 Tier-1 daily P&L halt (hg_spec_v1.3 §6.1)
  # Per-product thresholds (RiskMonitor checks each product's worst-case;
  # mixing ETH mult=50 and HG mult=25000 contract-equivalent values in
  # one sum is meaningless).
  delta_kill: 5.0              # Per-product |net_delta| kill threshold
  vega_kill: 1000              # Per-product |net_vega| (per vol pt) kill threshold
  # Hard floor on portfolio theta ($/day). Only enforced in
  # margin-escape mode (see constraints.margin_escape_enabled) — the
  # normal path uses the softer constraints.theta_floor ceiling.
  theta_kill: -500

operations:
  weekend_flatten: true
  daily_reset_hour_ct: 17      # 5pm CT — CME daily session end
  reconcile_interval_sec: 60   # Periodic portfolio↔IBKR position diff (defense vector #9)

logging:
  log_dir: "./logs"
  # REJECTs are noisy and the same info is captured in quotes.csv (skip_reason
  # column) at much lower per-row cost. Leave off in steady state; flip to true
  # when actively debugging gating logic.
  log_rejections: false
  log_quotes: true

# ── Shared defaults (each product's override block merges onto these) ──
puts:
  # Puts share the constraints/kill_switch budget with calls (combined
  # portfolio architecture). This block only carries the on/off toggle
  # and the default put-side quoting range.
  enabled: true
  quote_range_low: -25         # 25 strikes below ATM
  quote_range_high: 0          # up to ATM (inclusive)

quoting:
  # Which subscribed expiries the quote engine should actually place orders
  # on. Tokens: "front" | "front+1" | "front+2" (or "front+N") resolve at
  # runtime against state.expiries. front+2 is subscribed (for SABR surface
  # coverage) but NOT quoted — back-month SVI fits only 7-10 strikes per
  # side, too thin to pin 5 parameters reliably. Dropped after the parity
  # fix (c68f614) to remove remaining thin-fit exposure.
  enabled_expiries: ["front", "front+1"]
  tick_size: 0.50              # ETHUSDRR minimum tick ($0.50 per point = $25 per contract)
  penny_jump_ticks: 1          # Number of ticks inside incumbent's spread
  # Modify dead-band: skip a re-price unless the new target differs from
  # the resting order by at least this many ticks. Cuts API message rate
  # at the cost of slightly slower follow-up to small incumbent moves.
  min_modify_ticks: 2
  # Delta-retreat: when F moves more than this many dollars since the order
  # was last placed/modified, shift the resting price by delta × ΔF instead
  # of penny-jumping the incumbent. Protects against AS during fast moves.
  # Calibrated to ~2× the ETH p99 tick-to-tick ($4.25).
  delta_retreat_threshold: 5.0
  # Outbound API token bucket (IBKR ~50 msg/sec hard throttle). 250 capacity
  # absorbs short bursts; 250/sec refill caps sustained rate at the throttle.
  api_bucket_capacity: 250
  api_bucket_refill_per_sec: 250
  # Modify-storm guard (defense vector #14). Cancel-replace instead of
  # amending if a single orderId exceeds this many modifies/sec.
  max_modifies_per_sec_per_oid: 5
  # Hard cap on total resting orders per side across all strikes.
  max_resting_per_side: 90
  # Back-month dampeners (crowsnest 2026-04-18 hotfix). SVI fits only
  # 7-10 strikes per side on back months, so ATM theo is extrapolated
  # with wide uncertainty bands. Widen our quoted edge (× width_mul) and
  # shrink size (× size_mul) on anything that isn't the front month,
  # capping dollar damage while Change 3 (fallback surface + higher
  # min-strikes gate) lands.
  backmonth_width_mul: 2.0
  backmonth_size_mul: 0.5
  refresh_interval_ms: 1000
  tick_batch_window_sec: 0.005
  snapshot_write_interval_sec: 0.25
  greek_refresh_seconds: 300
  # Depth-aware incumbent selection
  depth_levels: 5
  # IBKR caps concurrent depth subs (typically 3 for retail, up to 5 for
  # higher-tier accounts). ETH takes 3, HG takes 2 — total ≤ 5.
  max_active_depth_subs: 3
  depth_rotation_interval_sec: 2
  min_incumbent_size: 2
  max_bbo_width_dollars: 10.00
  max_quote_staleness_sec: 10
  filter_self_orders: true

pricing:
  sabr_enabled: true
  # Minimum $ edge vs SABR theo before we'll quote. Loosened from 1.0 to
  # 0.5 (one tick) on 2026-04-08 to test capture rate.
  min_edge_points: 1.0
  # Consecutive theo_edge violations required before cancelling a resting
  # order. 1 = no hysteresis (cancel on first violation).
  theo_edge_hysteresis_ticks: 1
  sabr_recalibrate_seconds: 60
  # Force a SABR recal when the futures forward moves > $N since the last
  # fit. $2 trigger → ~10 recals during a $20 move, keeping theo fresh.
  sabr_fast_recal_dollars: 2.0
  vol_model: "svi"             # "svi" (5-param) or "sabr" (3-param, original)
  sabr_beta: 0.5               # Only used when vol_model=sabr
  sabr_max_rmse: 0.03
  sabr_min_strikes: 8
  # SVI-specific minimum. Used only when vol_model=svi. Raised to 10
  # per crowsnest Change 3 so we stop accepting underdetermined 5-param
  # fits on 5-8 strikes. Back-months that fail this gate fall back to the
  # term-structure-interpolation surface in src/backmonth_surface.py
  # (front-month shape + back-month level anchor).
  svi_min_strikes: 10
  stale_iv_threshold: 0.10
  max_calibration_bbo_width: 10.0

synthetic_span:
  # ETH-calibrated 2026-04-06 at F=$2,100, IV=66.6% (fit ±$3-5K per leg).
  up_scan_pct: 0.56
  down_scan_pct: 0.49
  vol_scan_pct: 0.25
  extreme_mult: 3.0
  extreme_cover: 0.33
  short_option_minimum: 500.0

# ── Products (primary first; index 0 is used for watchdog + healthcheck snapshot) ──
products:
  # ETH wound down 2026-04-18 pending HG-only pivot (crowsnest handoff spec v1.2).
  # Re-enable by un-commenting the block below. Healthcheck target moved to HG
  # snapshot path (see docker-compose.yml); revert that too when restoring ETH.
  # - name: "ETH"
  #   snapshot_path: "data/chain_snapshot.json"
  #   product:
  #     symbol: "ETH"
  #     exchange: "CME"
  #     multiplier: 50
  #     currency: "USD"
  #     option_type: "both"
  #     strike_range_low: -30
  #     strike_range_high: 30
  #     quote_range_low: 0
  #     quote_range_high: 25
  #     min_dte: 3
  #     subscribed_expiries: 3
  #     quote_size: 1
  #     underlying_symbol: "ETHUSDRR"
  #     option_symbol: "ETH"
  #     trading_class: "ETH"
  #     security_type: "FOP"
  #     strike_increment: 25

  - name: "HG"
    snapshot_path: "data/hg_chain_snapshot.json"
    product:
      symbol: "HXE"
      exchange: "COMEX"
      multiplier: 25000        # 25,000 lbs per contract
      currency: "USD"
      option_type: "both"
      # Subscribe on the $0.05 grid only — penny strikes between have
      # near-zero OI and never trade. ±11 × $0.05 = ATM±$0.55.
      strike_range_low: -11
      strike_range_high: 11
      # v1.3 asymmetric NEAR-OTM+ATM (hg_spec_v1.3 §3.3): calls ATM to ATM+5
      # nickels ($0.25 OTM). ATM strike is quoted on BOTH C and P (11 unique
      # strikes → 12 instruments → 24 max resting orders).
      quote_range_low: 0       # ATM
      quote_range_high: 5      # ATM + 5×$0.05 = ATM + $0.25
      min_dte: 3
      max_dte: 35              # hg_spec_v1.3 §2.3: do NOT quote DTE > 35
      subscribed_expiries: 3
      quote_size: 1
      underlying_symbol: "HG"  # COMEX copper futures
      option_symbol: "HXE"
      trading_class: "HXE"
      security_type: "FOP"
      strike_increment: 0.05   # $0.05 grid (skips penny strikes)
    puts:
      enabled: true
      # v1.3 asymmetric NEAR-OTM+ATM (hg_spec_v1.3 §3.3): puts ATM-5 nickels
      # to ATM ($0.25 OTM to ATM). ATM shared with call side.
      quote_range_low: -5      # ATM − 5×$0.05 = ATM − $0.25
      quote_range_high: 0      # ATM
    # HG-specific overrides for shared config blocks. All dollar-denominated
    # thresholds are ~1/400th of ETH's (HG ~$6/lb vs ETH ~$2300).
    quoting:
      # Stage 1 smoke test: quote front-month only (hg_spec_v1.3 §2.3, DTE
      # ≤ 35). front+1 subscribed for SABR surface coverage but not quoted
      # — spec §1 explicitly excludes back-month quoting.
      enabled_expiries: ["front"]
      tick_size: 0.0005        # HG option minimum tick ($0.0005/lb = $12.50/contract)
      max_bbo_width_dollars: 0.05
      delta_retreat_threshold: 0.02
      max_resting_per_side: 120
      max_active_depth_subs: 2
      # HG tick is 1/1000 of ETH's. Widen dead-band + raise per-oid cap so
      # genuine moves land without dropping SABR-driven modifies (2026-04-16).
      min_modify_ticks: 20     # $0.01 dead-band
      max_modifies_per_sec_per_oid: 20
    pricing:
      min_edge_points: 0.001   # $0.001 × 25000 = $25/contract
      max_calibration_bbo_width: 0.05
      stale_iv_threshold: 0.25
      # Match ETH's fraction-of-F fast-recal: $0.005 on HG ~= $2 on ETH.
      sabr_fast_recal_dollars: 0.005
    # Copper SPAN scan is ~1/7th of ETH's (CME uses 6-8% vs 56% for ETH).
    # Calibrated 2026-04-14 to target ~$15K per naked short.
    synthetic_span:
      up_scan_pct: 0.08
      down_scan_pct: 0.08
      vol_scan_pct: 0.20
      short_option_minimum: 500.0
