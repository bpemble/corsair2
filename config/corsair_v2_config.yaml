account:
  gateway_host: "127.0.0.1"
  gateway_port: 4002
  client_id: 0  # MUST be 0 on FA accounts — see connection.py
  account_id: "UXXXXXXX"

product:
  symbol: "ETH"
  exchange: "CME"
  multiplier: 50
  currency: "USD"
  option_type: "both"         # "calls_only", "puts_only", "both"
  # Subscription/display range — wider window we receive market data for.
  # Per spec: 5-strike buffer below the put quoting range (ATM-20) and 5
  # strikes above the call quoting range (ATM+20). Subscribes both rights
  # at every strike in this range, so total streaming lines = 2 × (high - low + 1) + 1.
  # At -25/+25 that's 103 lines, just over IB's standard 100-line cap —
  # tighten if any strikes fail to subscribe at startup.
  strike_range_low: -25       # Strikes below ATM to subscribe (negative = below)
  strike_range_high: 25       # Strikes above ATM to subscribe
  # CALL quoting range — narrower window we actually quote calls in.
  quote_range_low: 0          # 0 = ATM
  quote_range_high: 20        # Number of strikes above ATM to quote
  min_dte: 3                  # Skip options with <= 3 DTE
  expiry: "front_month"       # "front_month" only for now
  quote_size: 1               # Lot size per quote
  underlying_symbol: "ETHUSDRR"
  option_symbol: "ETH"
  trading_class: "ETH"
  security_type: "FOP"
  strike_increment: 25        # ETH strike spacing

constraints:
  # COMBINED portfolio bucket. Stage 1 of the deployment ramp: shared
  # margin/delta/theta budgets across calls and puts (cross-margining
  # benefit is the whole point of running both sides). $200K capital,
  # 50% utilization → $100K SPAN cap. Note: synthetic SPAN runs ~+50%
  # over IBKR's reported MaintMarginReq (documented in src/synthetic_span.py),
  # so the effective real-IBKR ceiling is closer to $66K. Conservative bias
  # is appropriate for first real-money deployment — leave the percentage
  # at 50% and let the synthetic act as the binding constraint.
  capital: 200000
  margin_ceiling_pct: 0.50    # 50% of $200K = $100K synthetic
  delta_ceiling: 3.0          # |portfolio net_delta| must be <= this
  theta_floor: -200           # portfolio net_theta $/day, must be >= this

puts:
  # Puts now share the constraints/kill_switch budget with calls (combined
  # portfolio architecture per Stage 1 spec). This block only carries the
  # on/off toggle and the put-side quoting range — there are no longer
  # independent margin/delta/theta budgets for puts.
  enabled: true
  quote_range_low: -20        # 20 strikes below ATM
  quote_range_high: 0         # up to ATM (inclusive)

kill_switch:
  margin_kill_pct: 0.70       # 70% of $200K = $140K (Stage 1)
  max_daily_loss: -2500       # Dollars (Stage 1)
  delta_kill: 5.0             # Combined |net_delta| kill threshold
  vega_kill: 1000             # |net_vega| (per vol pt) kill threshold (NEW)

quoting:
  tick_size: 0.50             # ETHUSDRR minimum tick ($0.50 per point = $25 per contract)
  penny_jump_ticks: 1         # Number of ticks inside incumbent's spread
  # Modify dead-band: skip a re-price unless the new target differs from
  # the resting order by at least this many ticks. Set to 1 (default) for
  # exact-tick equality only; set to 2+ to suppress 1-tick noise driven by
  # a flickering BBO. Cuts API message rate at the cost of slightly slower
  # follow-up to small incumbent moves. Ported from corsair v1's tick-level
  # short-circuit (order_manager.py:188-205).
  min_modify_ticks: 2
  # Outbound API token bucket (IBKR ~50 msg/sec hard throttle). 250 capacity
  # absorbs short bursts; 250/sec refill caps sustained rate at the throttle.
  # Modifies and cancels that exceed the bucket are silently dropped — the
  # next quote cycle re-evaluates. Ported from corsair v1.
  api_bucket_capacity: 250
  api_bucket_refill_per_sec: 250
  # Modify-storm guard (defense vector #14). Cancel-replace instead of
  # amending if a single orderId exceeds this many modifies/sec.
  max_modifies_per_sec_per_oid: 5
  # Hard cap on total resting orders per side across all strikes
  # (defense vector #11). With ~21 quotable strikes per side this is
  # ~3x the expected steady-state and gives runaway-bug headroom.
  max_resting_per_side: 60
  refresh_interval_ms: 1000   # Periodic full-refresh fallback (event-driven path is real-time)
  tick_batch_window_sec: 0.005       # Drain queue for 5ms after first tick (latency floor)
  snapshot_write_interval_sec: 0.25  # Dashboard snapshot cadence (4Hz for near-real-time UI)
  greek_refresh_seconds: 300  # Refresh Greeks every 5 minutes
  # Depth-aware incumbent selection
  depth_levels: 5                  # Subscribe to top N levels per strike per side
  # IBKR caps concurrent depth subs (typically 3 for retail, up to 5 for
  # higher-tier accounts). The ib_insync IndexError race in updateMktDepthL2
  # is patched at startup via src/ib_insync_patch.py so depth cycling can
  # run safely. If you see "reqMktDepth rotate failed" warnings, drop to 3.
  max_active_depth_subs: 5
  depth_rotation_interval_sec: 2   # Cycle the depth window every N seconds
  min_incumbent_size: 2            # Min contracts at a level to be a "real" incumbent
  max_bbo_width_dollars: 10.00     # Don't penny-jump if BBO is wider than this (ETH options typically $5-8)
  max_quote_staleness_sec: 10      # Discard depth older than N seconds
  filter_self_orders: true         # Exclude our own orders from incumbent search

operations:
  weekend_flatten: true
  daily_reset_hour_ct: 17     # 5pm CT — CME daily session end
  reconcile_interval_sec: 60  # Periodic portfolio↔IBKR position diff (defense vector #9)

pricing:
  sabr_enabled: true
  min_edge_points: 0.5        # Reject quote if our price is within $N of SABR theo.
                              # Loosened from 1.0 to 0.5 (one tick) on 2026-04-08
                              # to test capture rate. SABR's structural fit residual
                              # is ~±$1, so the effective real-world edge floor is
                              # still ~$1.5; we're trading some model-confidence
                              # cushion for ~3x the quotable surface area.
  # Theo-vs-incumbent sanity gate (defense vector #3). If SABR theo and
  # the incumbent price disagree by more than this many ticks, refuse to
  # quote — either the incumbent is stale junk or the SABR fit is broken.
  theo_vs_incumbent_max_ticks: 6.0
  theo_edge_hysteresis_ticks: 1  # Consecutive theo_edge violations required before
                                 # cancelling a resting order. 1 = no hysteresis
                                 # (cancel on first violation, original behavior).
                                 # 2 = require two cycles (smoother, but observed
                                 # to trade `idle` for `behind` in the 2026-04-08
                                 # measurement). Default 1 until we have data
                                 # justifying the trade-off.
  sabr_recalibrate_seconds: 60
  sabr_fast_recal_dollars: 10.0  # Force a recal when underlying moves > $N since last fit
  sabr_beta: 1.0              # Fixed backbone (1.0 = lognormal, matches v1)
  sabr_max_rmse: 0.03         # Reject SABR fit if RMSE exceeds this
  sabr_min_strikes: 8         # Reject fit if fewer than N strikes contributed (quality gate)
  stale_iv_threshold: 0.10    # IV discrepancy threshold for stale detection
  max_calibration_bbo_width: 10.0  # Drop strikes with wider BBOs from SABR calibration (synthetic mids on illiquid strikes)

synthetic_span:
  # Calibrated 2026-04-06 against IBKR short-side observations at F=$2,100, IV=66.6%:
  #   short 2100C/2200C/2400C: $60,372 / $59,761 / $58,910
  #   short 2100P/1850P:       $47,383 / $45,011
  #   short 2400C/long 2500C vertical: $4,388 (model: $5,000)
  # Fit is ±$3-5K per single short (<6% of notional); vertical fits within $600.
  up_scan_pct: 0.56
  down_scan_pct: 0.49
  vol_scan_pct: 0.25
  extreme_mult: 3.0
  extreme_cover: 0.33
  short_option_minimum: 500.0

logging:
  log_dir: "./logs"
  # REJECTs are noisy and the same info is captured in quotes.csv (skip_reason
  # column) at much lower per-row cost. Leave off in steady state; flip to true
  # when actively debugging gating logic.
  log_rejections: false
  log_quotes: true
