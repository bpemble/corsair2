# Corsair v3 Rust runtime config — LIVE deployment (Phase 5B.7 + 6.7).
#
# Maps the operational settings from config/hg_v1_4_paper.yaml into
# the v3 schema. corsair_broker daemon (Rust) is now the live runtime.
#
# This config drives the Rust broker in LIVE mode:
#   - Connects to IBKR via NativeBroker (native wire protocol, no
#     ib_insync) on clientId=0 — the FA master that sees all order
#     status messages.
#   - Hosts the IPC server for the Rust trader binary.
#   - Owns position book / risk monitor / hedge manager / snapshot.
#   - Snapshot path matches the dashboard's expected path
#     (/app/data/hg_chain_snapshot.json) so the dashboard works
#     unchanged.
#
# Cutover history:
#   2026-05-02: NativeBroker live. ib_insync retired from runtime hot
#               path. Phase 6.5b (bootstrap-wait fix) + 6.6 (Broker
#               trait impl) + 6.7 (runtime wiring) all landed today.

broker:
  # "ibkr" = native wire client (Phase 6 default). Use "ibkr_pyo3"
  # for emergency rollback to the ib_insync bridge.
  kind: ibkr
  ibkr:
    gateway:
      host: 127.0.0.1
      port: 4002
    # clientId=0 = FA master client. Required to see order status for
    # orders placed by any client on the connection (CLAUDE.md §1).
    client_id: 0
    account: DUP553657

risk:
  daily_pnl_halt_pct: 0.05    # spec §6.1 PRIMARY defense
  margin_kill_pct: 0.70
  delta_kill: 5.0
  vega_kill: 0                 # disabled 2026-04-23 (Alabaster)
  theta_kill: -500

constraints:
  capital: 500000
  margin_ceiling_pct: 0.50    # → $250K soft ceiling
  delta_ceiling: 3.0
  theta_floor: -500
  effective_delta_gating: true
  margin_escape_enabled: true

products:
  - name: HG
    multiplier: 25000
    default_iv: 0.30
    quote_range_low: -5
    quote_range_high: 5
    strike_increment: 0.05
    enabled: true

quoting:
  tick_size: 0.0005
  min_edge_ticks: 2
  max_strike_offset_usd: 0.30
  gtd_lifetime_s: 30.0
  gtd_refresh_lead_s: 3.5
  dead_band_ticks: 2
  min_send_interval_ms: 250

hedging:
  enabled: true
  mode: execute                # LIVE: place hedge orders
  tolerance_deltas: 0.5
  rebalance_on_fill: true
  rebalance_cadence_sec: 30
  include_in_daily_pnl: true
  flatten_on_halt: true
  ioc_tick_offset: 2
  hedge_tick_size: 0.0005
  hedge_lockout_days: 30

snapshot:
  # Production path — same as Python broker's hg_chain_snapshot.json
  # so the dashboard works without any changes.
  path: /app/data/hg_chain_snapshot.json
  cadence_ms: 250

runtime:
  log_level: info
